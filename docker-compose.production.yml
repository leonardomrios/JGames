services:
  app:
    build: .
    container_name: semillitas-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://gamekids_user:${POSTGRES_PASSWORD}@host.docker.internal:5432/gamekids
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
    mem_limit: 512m
    cpus: 0.5
    volumes:
      - semillitas_levels:/app/public/levels

volumes:
  semillitas_levels:
