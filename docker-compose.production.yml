services:
  app:
    build: .
    container_name: semillitas-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://semillitas:${POSTGRES_PASSWORD}@postgres:5432/semillitas
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
    volumes:
      - semillitas_levels:/app/public/levels
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: semillitas-db-prod
    restart: unless-stopped
    environment:
      - POSTGRES_USER=semillitas
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=semillitas
    volumes:
      - semillitas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semillitas"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: semillitas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  semillitas_pgdata:
  semillitas_levels:
